services:
  calledit:
    build: .
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8787
      DATABASE_PATH: /data/calledit.db
      DEMO_MODE: "false"
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:?required}
      TELEGRAM_BOT_USERNAME: ${TELEGRAM_BOT_USERNAME:-CalledItBetBot}
      TELEGRAM_WEBHOOK_SECRET: ${TELEGRAM_WEBHOOK_SECRET:?required}
      TXLINE_NETWORK: devnet
      TXLINE_BASE_URL: https://txline-dev.txodds.com/api/
      TXLINE_SERVICE_LEVEL: ${TXLINE_SERVICE_LEVEL:-1}
      TXLINE_AUTH_JWT: ${TXLINE_AUTH_JWT:?required}
      TXLINE_API_TOKEN: ${TXLINE_API_TOKEN:?required}
      TXLINE_COMPETITION_ID: ${TXLINE_COMPETITION_ID:-72}
      RECEIPT_CHAIN_ENABLED: "false"
      MARKET_ENABLED: ${MARKET_ENABLED:-false}
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-}
      SOLANA_MARKET_PROGRAM_ID: ${SOLANA_MARKET_PROGRAM_ID:-}
      SOLANA_MARKET_AUTHORITY_SECRET: ${SOLANA_MARKET_AUTHORITY_SECRET:-}
      SOLANA_MARKET_SETTLEMENT_AUTHORITY: ${SOLANA_MARKET_SETTLEMENT_AUTHORITY:-}
      SOLANA_MARKET_EMERGENCY_AUTHORITY: ${SOLANA_MARKET_EMERGENCY_AUTHORITY:-}
      SOLANA_MARKET_EMERGENCY_SECRET: ${SOLANA_MARKET_EMERGENCY_SECRET:-}
      MARKET_STAKE_LAMPORTS: ${MARKET_STAKE_LAMPORTS:-10000000}
      MARKET_MAX_ENTRIES: ${MARKET_MAX_ENTRIES:-100}
      MARKET_INTENT_TTL_SECONDS: ${MARKET_INTENT_TTL_SECONDS:-900}
    ports:
      - "8787:8787"
    volumes:
      - calledit-data:/data

volumes:
  calledit-data:
